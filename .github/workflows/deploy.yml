name: Deploy hired.uz

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two production deploys at once
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      # CI gate: a broken build (tsc or vite) fails here and blocks the deploy.
      - name: Build dashboard
        working-directory: dashboard
        run: |
          npm ci
          npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts 2>/dev/null

      # React SPA -> nginx web root (hashed asset names; --delete drops stale bundles)
      - name: Deploy dashboard
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key" \
            dashboard/dist/ \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/var/www/gethired/"

      # Backend code -> app dir. Runtime state (.env, data, chroma_db, venv) is
      # excluded, so --delete never touches it.
      - name: Deploy backend
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key" \
            --exclude='.git' \
            --exclude='venv' \
            --exclude='.venv' \
            --exclude='node_modules' \
            --exclude='dashboard' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='data' \
            --exclude='chroma_db' \
            --exclude='bot.lock' \
            --exclude='requirements.server.txt' \
            ./ "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:gethired/"

      - name: Install deps & restart services
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}" "
            set -e
            cd ~/gethired
            ./venv/bin/pip install -r requirements.txt --quiet
            sudo systemctl restart gethired-api
            sudo systemctl restart gethired-bot
            sleep 4
            systemctl is-active gethired-api gethired-bot
          "

      - name: Purge Cloudflare cache
        if: success()
        env:
          CF_ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "${CF_ZONE:-}" ] && [ -n "${CF_TOKEN:-}" ]; then
            curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/purge_cache" \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              --data '{"purge_everything":true}' && echo "Cloudflare cache purged"
          else
            echo "Cloudflare secrets not set; skipping cache purge"
          fi
